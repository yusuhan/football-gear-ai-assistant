services:
  - type: web
    name: football-gear-ai-assistant-api
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: football-gear-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/football_gear.db
      - key: BACKEND_CORS_ORIGIN
        sync: false
      - key: USE_OPENAI
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SUPPORT_USERNAME
        value: support
      - key: SUPPORT_PASSWORD
        generateValue: true
